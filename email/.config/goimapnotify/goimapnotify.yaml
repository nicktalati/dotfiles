configurations:
  -
    host: imap.gmail.com
    port: 993
    tls: true
    tlsOptions:
      rejectUnauthorized: true
    username: nicktalati@gmail.com
    passwordCMD: "python /usr/share/neomutt/oauth2/mutt_oauth2.py --encryption-pipe 'cat' --decryption-pipe 'cat' ~/decrypt/secrets/oauth/nicktalati.oauth2"
    xoAuth2: true
    wait: 5
    boxes:
      - 
        mailbox: INBOX
        onNewMail: "mbsync nicktalati:INBOX"
        onNewMailPost: "notify-mail ~/mail/nicktalati/Inbox"
      -
        mailbox: "[Gmail]/All Mail"
        onNewMail: "mbsync 'nicktalati:[Gmail]/All Mail'"
